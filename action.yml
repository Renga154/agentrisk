name: AgentRisk
description: Zero-execution preflight scanner for AI-agent and MCP workspace risk
author: satourenware
inputs:
  path:
    description: Workspace path to scan
    required: false
    default: "."
  format:
    description: "Output format: terminal, json, markdown, or sarif"
    required: false
    default: "sarif"
  output:
    description: Report output path
    required: false
    default: "agentrisk.sarif"
  fail-on:
    description: Fail when findings are at least this severity
    required: false
    default: "high"
  min-severity:
    description: Render findings at least this severity
    required: false
    default: "low"
runs:
  using: composite
  steps:
    - name: Run AgentRisk
      shell: bash
      env:
        AGENTRISK_PATH: ${{ inputs.path }}
        AGENTRISK_FORMAT: ${{ inputs.format }}
        AGENTRISK_OUTPUT: ${{ inputs.output }}
        AGENTRISK_FAIL_ON_INPUT: ${{ inputs.fail-on }}
        AGENTRISK_MIN_SEVERITY_INPUT: ${{ inputs.min-severity }}
      run: |
        node "$GITHUB_ACTION_PATH/dist/cli.cjs" scan "$AGENTRISK_PATH" \
          --format "$AGENTRISK_FORMAT" \
          --output "$AGENTRISK_OUTPUT" \
          --fail-on "$AGENTRISK_FAIL_ON_INPUT" \
          --min-severity "$AGENTRISK_MIN_SEVERITY_INPUT"
