name: False positive
description: Report a noisy or incorrect finding
title: "[False positive]: "
labels: ["false-positive"]
body:
  - type: input
    id: rule
    attributes:
      label: Rule ID
      placeholder: "mcp-unpinned-dlx"
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Minimal fixture
      description: Paste the smallest safe example that reproduces the finding. Redact secrets.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: reasoning
    attributes:
      label: Why this should not be flagged
    validations:
      required: true

