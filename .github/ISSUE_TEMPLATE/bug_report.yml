name: Bug report
description: Report an AgentRisk bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Include the smallest config or instruction file that reproduces the issue. Do not include real secrets.
      render: markdown
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AgentRisk version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      render: shell

